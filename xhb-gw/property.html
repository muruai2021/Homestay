<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房源详情 - 猩伙伴民宿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Back Button -->
  <button class="back-btn" onclick="history.back()">
    &larr; 返回
  </button>

  <!-- Property Hero -->
  <section class="property-hero" id="propertyHero">
    <div class="property-hero-overlay"></div>
    <div class="property-hero-content">
      <div class="property-detail-container">
        <div class="property-detail-header">
          <div>
            <h1 class="property-detail-title" id="propertyName">加载中...</h1>
            <div class="property-detail-tags" id="propertyTags">
              <!-- Tags populated by JS -->
            </div>
          </div>
          <div class="property-price">
            <p class="price-label">参考价格</p>
            <p class="price-value" id="propertyPrice">电询</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Property Detail Content -->
  <section class="section">
    <div class="property-detail-container">
      <div class="property-grid">
        <!-- Main Content -->
        <div class="property-main">
          <!-- 房间特色 -->
          <div class="property-section">
            <h2>房间特色</h2>
            <p class="property-features-text" id="propertyFeatures">加载中...</p>
          </div>

          <!-- 基础设施 -->
          <div class="property-section">
            <h2>基础设施</h2>
            <div class="amenities-grid" id="propertyAmenities">
              <!-- Populated by JS -->
            </div>
          </div>

          <!-- 卫浴设施 -->
          <div class="property-section">
            <h2>卫浴设施</h2>
            <div class="amenities-grid" id="propertyBathroom">
              <!-- Populated by JS -->
            </div>
          </div>

          <!-- 交通信息 -->
          <div class="property-section">
            <h2>交通信息</h2>
            <div class="transport-list" id="propertyTransport">
              <!-- Populated by JS -->
            </div>
          </div>

          <!-- 相册 -->
          <div class="property-section">
            <h2>房源图片</h2>
            <div class="gallery-grid" id="propertyGallery">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="property-sidebar">
          <!-- 基本信息 -->
          <div class="info-card">
            <h3>基本信息</h3>
            <div class="info-item">
              <span class="info-label">小区</span>
              <span class="info-value" id="infoCommunity">加载中...</span>
            </div>
            <div class="info-item">
              <span class="info-label">户型</span>
              <span class="info-value" id="infoType">加载中...</span>
            </div>
            <div class="info-item">
              <span class="info-label">可住人数</span>
              <span class="info-value" id="infoCapacity">加载中...</span>
            </div>
            <div class="info-item">
              <span class="info-label">面积</span>
              <span class="info-value" id="infoArea">加载中...</span>
            </div>
            <div class="info-item">
              <span class="info-label">地址</span>
              <span class="info-value" id="infoAddress">加载中...</span>
            </div>
          </div>

          <!-- 联系预订 -->
          <div class="info-card contact-card">
            <h3>立即预订</h3>
            <div class="info-item">
              <span class="info-label">客服电话</span>
              <span class="info-value">15874818550</span>
            </div>
            <div class="info-item">
              <span class="info-label">微信</span>
              <span class="info-value">同手机号</span>
            </div>
            <button class="btn-contact" onclick="window.location.href='tel:15874818550'">
              立即拨打咨询
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <img src="https://pic.imgdb.cn/item/6fb6b8ce6bbe3ef7f2798844.png" alt="猩伙伴" class="footer-logo">
          <span class="footer-name">猩伙伴民宿</span>
        </div>
        <div class="footer-links">
          <a href="index.html">首页</a>
          <a href="index.html#communities">房源小区</a>
          <a href="index.html#featured">精选房源</a>
          <a href="admin.html">管理后台</a>
        </div>
        <p class="footer-copy">&copy; 2026 猩伙伴民宿 All Rights Reserved</p>
      </div>
    </div>
  </footer>

  <!-- AI Chat Widget -->
  <div class="chat-widget" id="chatWidget">
    <button class="chat-toggle" id="chatToggle">
      <span class="chat-icon">&#x1F4AC;</span>
      <span class="chat-pulse"></span>
    </button>
    <div class="chat-box" id="chatBox">
      <div class="chat-header">
        <h4>猩伙伴AI客服</h4>
        <button class="chat-close" id="chatClose">&times;</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="message bot">
          <p>您好！我是猩伙伴AI客服，请问有什么可以帮助您的？</p>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="输入您的问题...">
        <button class="chat-send" id="chatSend">发送</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/property.js"></script>
</body>
</html>
