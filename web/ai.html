<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猩伙伴 - AI 员工后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #1a1a2e; --primary-dark: #0f0f1a; --secondary: #16213e; --accent: #c4a35a; --accent-light: #d4b96a; --text-light: #eae7dc; --text-muted: #a0a0a0; --bg-dark: #0f0f1a; --bg-card: rgba(30, 30, 50, 0.8); --border-color: rgba(196, 163, 90, 0.3); --transition: all 0.3s ease; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-dark); color: var(--text-light); min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        .top-nav { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: rgba(15, 15, 26, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 1000; }
        .top-nav-brand { display: flex; align-items: center; gap: 12px; }
        .top-nav-brand svg { width: 32px; height: 32px; }
        .top-nav-brand span { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; font-weight: 600; color: var(--accent); }
        .top-nav-menu { display: flex; align-items: center; gap: 8px; }
        .top-nav-link { padding: 8px 16px; font-size: 0.9rem; color: var(--text-muted); border-radius: 6px; transition: var(--transition); cursor: pointer; border: none; background: transparent; }
        .top-nav-link:hover { color: var(--text-light); background: rgba(255, 255, 255, 0.05); }
        .top-nav-link.active { color: var(--accent); background: rgba(196, 163, 90, 0.15); }
        .main-container { padding-top: 60px; min-height: 100vh; }

        /* 首页卡片视图 */
        .home-view { padding: 60px 40px 40px; min-height: 100vh; }
        .home-header { text-align: center; margin-bottom: 48px; }
        .home-header h1 { font-family: 'Noto Serif SC', serif; font-size: 2.2rem; color: var(--accent); margin-bottom: 12px; letter-spacing: 0.05em; }
        .home-header p { color: var(--text-muted); font-size: 1rem; }
        .agent-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 28px; max-width: 1200px; margin: 0 auto; }
        .agent-card { background: linear-gradient(145deg, rgba(30, 30, 50, 0.9), rgba(22, 33, 62, 0.8)); border: 1px solid var(--border-color); border-radius: 20px; padding: 32px; cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; box-sizing: border-box; }
        .agent-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-light)); opacity: 0; transition: var(--transition); }
        .agent-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(196, 163, 90, 0.15); }
        .agent-card:hover::before { opacity: 1; }
        .agent-card-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .agent-card-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--secondary); display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .agent-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .agent-card-info { flex: 1; min-width: 0; }
        .agent-card-name { font-size: 1.2rem; font-weight: 600; color: var(--text-light); margin-bottom: 6px; }
        .agent-card-title { font-size: 0.9rem; color: var(--accent); font-weight: 500; }
        .agent-card-nickname { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
        .agent-card-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; }
        .agent-card-edit { position: absolute; top: 20px; right: 20px; width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition); }
        .agent-card:hover .agent-card-edit { opacity: 1; }
        .agent-card-edit:hover { background: rgba(196, 163, 90, 0.2); }
        .agent-card-edit svg { width: 18px; height: 18px; color: var(--text-muted); }

        /* 聊天视图 - 全屏优雅设计 */
        .chat-view { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: none; flex-direction: column; background: var(--primary-dark); z-index: 999; }
        .chat-view.active { display: flex; }
        .chat-header { padding: 0 32px; height: 72px; background: linear-gradient(180deg, rgba(22, 33, 62, 0.95), rgba(15, 15, 26, 0.9)); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 20px; backdrop-filter: blur(20px); }
        .chat-header-left { display: flex; align-items: center; gap: 20px; flex: 1; }
        .back-btn { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-muted); cursor: pointer; transition: var(--transition); }
        .back-btn:hover { background: rgba(196, 163, 90, 0.15); border-color: var(--accent); color: var(--accent); }
        .back-btn svg { width: 20px; height: 20px; }
        .chat-header-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--secondary); overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-header-info { display: flex; flex-direction: column; gap: 4px; }
        .chat-header-name { font-size: 1.1rem; font-weight: 600; color: var(--text-light); }
        .chat-header-title { font-size: 0.85rem; color: var(--accent); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 32px 48px; display: flex; flex-direction: column; gap: 24px; background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1a 100%); }
        .message { display: flex; gap: 16px; max-width: 68%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.avatar-left { align-self: flex-start; }
        .message-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--secondary); overflow: hidden; flex-shrink: 0; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
        .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message.user .message-avatar { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }
        .message-bubble { padding: 18px 24px; border-radius: 20px; font-size: 1rem; line-height: 1.7; word-break: break-word; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
        .message.avatar-left .message-bubble { background: linear-gradient(145deg, rgba(30, 30, 50, 0.95), rgba(22, 33, 62, 0.9)); border: 1px solid var(--border-color); border-top-left-radius: 6px; }
        .message.user .message-bubble { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: var(--primary-dark); border-top-right-radius: 6px; font-weight: 400; }
        .message-bubble p { margin-bottom: 10px; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble pre { background: rgba(0,0,0,0.4); padding: 16px; border-radius: 12px; overflow-x: auto; margin: 12px 0; border: 1px solid rgba(255,255,255,0.1); }
        .message-bubble code { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.9rem; background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 6px; }
        .message-bubble pre code { background: transparent; padding: 0; }
        .message-bubble ul, .message-bubble ol { margin: 12px 0; padding-left: 24px; }
        .message-bubble li { margin-bottom: 6px; }
        .message-bubble h1, .message-bubble h2, .message-bubble h3 { margin: 16px 0 10px 0; font-weight: 600; color: var(--accent); }
        .message-bubble strong { font-weight: 600; }
        .message-bubble a { color: var(--accent-light); text-decoration: underline; }
        .loading-msg { color: var(--text-muted); font-style: italic; }
        .chat-input-area { padding: 20px 48px 28px; background: linear-gradient(180deg, rgba(15, 15, 26, 0.9), rgba(22, 33, 62, 0.95)); border-top: 1px solid var(--border-color); }
        .chat-input-wrapper { display: flex; gap: 16px; align-items: flex-end; max-width: 900px; margin: 0 auto; }
        .chat-input { flex: 1; padding: 16px 24px; background: rgba(22, 33, 62, 0.8); border: 1px solid var(--border-color); border-radius: 28px; color: var(--text-light); font-size: 1rem; font-family: inherit; resize: none; max-height: 120px; min-height: 52px; line-height: 1.5; transition: var(--transition); }
        .chat-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.15); }
        .chat-input::placeholder { color: var(--text-muted); }
        .chat-send-btn { width: 52px; height: 52px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); border: none; border-radius: 50%; color: var(--primary-dark); cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 4px 16px rgba(196, 163, 90, 0.3); }
        .chat-send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(196, 163, 90, 0.4); }
        .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .chat-send-btn svg { width: 22px; height: 22px; }

        /* 编辑弹窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: var(--transition); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 32px; width: 90%; max-width: 480px; transform: scale(0.9); transition: var(--transition); }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .modal-title { font-size: 1.3rem; font-weight: 600; color: var(--accent); }
        .modal-close { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: rgba(255,255,255,0.1); }
        .modal-close svg { width: 20px; height: 20px; color: var(--text-muted); }
        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; }
        .form-input { width: 100%; padding: 14px 18px; background: var(--primary-dark); border: 1px solid var(--border-color); border-radius: 12px; color: var(--text-light); font-size: 1rem; font-family: inherit; }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .modal-actions { display: flex; gap: 14px; justify-content: flex-end; margin-top: 32px; }
        .btn { padding: 12px 28px; border-radius: 12px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: var(--transition); border: none; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: var(--text-muted); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: var(--primary-dark); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(196, 163, 90, 0.4); }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="top-nav-brand">
            <svg viewBox="0 0 56 56" fill="none"><defs><linearGradient id="navGrad" x1="10" y1="6" x2="46" y2="48"><stop stop-color="#c4a35a"/><stop offset="1" stop-color="#d4b96a"/></linearGradient></defs><path d="M28 6L10 20V48H22V34H34V48H46V20L28 6Z" stroke="url(#navGrad)" stroke-width="1.5" fill="none"/><path d="M34 48V40H42V48" stroke="url(#navGrad)" stroke-width="1.5" fill="none"/><path d="M14 48V40H22V48" stroke="url(#navGrad)" stroke-width="1.5" fill="none"/></svg>
            <span>猩伙伴 AI</span>
        </div>
        <div class="top-nav-menu">
            <a href="/" class="top-nav-link">官网</a>
            <button class="top-nav-link active" onclick="goHome()">AI 员工</button>
            <button class="top-nav-link" data-tab="dashboard" onclick="window.open('/ai/manage.html', '_blank')">运营看板</button>
            <button class="top-nav-link" onclick="logout()">退出</button>
        </div>
    </nav>
    <div class="main-container">
        <!-- 首页视图 -->
        <div class="home-view active" id="homeView">
            <div class="home-header">
                <h1>AI 员工团队</h1>
                <p>选择一位 AI 员工开始对话，或点击编辑按钮修改员工信息</p>
            </div>
            <div class="agent-card-grid" id="agentCardGrid"></div>
        </div>

        <!-- 聊天视图 -->
        <div class="chat-view" id="chatView">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button class="back-btn" onclick="goHome()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <div class="chat-header-avatar" id="chatAvatar"></div>
                    <div class="chat-header-info">
                        <div class="chat-header-name" id="chatTitle">请选择 AI 员工</div>
                        <div class="chat-header-title" id="chatSubtitle">点击员工开始对话</div>
                    </div>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <textarea class="chat-input" id="chatInput" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                    <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">编辑 AI 员工</div>
                <button class="modal-close" onclick="closeEditModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="form-group">
                <label class="form-label">名称</label>
                <input type="text" class="form-input" id="editName" placeholder="输入员工名称">
            </div>
            <div class="form-group">
                <label class="form-label">身份</label>
                <input type="text" class="form-input" id="editTitle" placeholder="输入员工身份">
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="saveAgentEdit()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // AI 员工配置 - 使用真实头像
        const AGENTS = [
            { id: 'xhs', name: '小红书文案', nickname: '南乔', title: '小红书运营专家', desc: '打造爆款种草文案', avatar: '/ai/avatars/运营管理师.png' },
            { id: 'wechat', name: '公众号文案', nickname: '凌风', title: '公众号运营专家', desc: '生成专业公众号文章', avatar: '/ai/avatars/民宿服务小助手.png' },
            { id: 'shortvideo', name: '短视频文案', nickname: '明轩', title: '短视频方案专家', desc: '生成视频脚本和分镜', avatar: '/ai/avatars/AI架构师.png' },
            { id: 'poster', name: '海报设计', nickname: '西柚', title: '海报设计专家', desc: 'AI生成精美海报', avatar: '/ai/avatars/Gemini_Generated_Image_3tmdzy3tmdzy3tmd.png' },
            { id: 'intelligence', name: '情报分析', nickname: '北辰', title: '情报分析专家', desc: '竞品分析趋势预测', avatar: '/ai/avatars/Gemini_Generated_Image_7cr7h87cr7h87cr7.png' },
            { id: 'knowledge', name: '企业知识库', nickname: '东篱', title: '知识库管家', desc: '企业知识管理和问答', avatar: '/ai/avatars/Gemini_Generated_Image_iinh9miinh9miinh.png' }
        ];

        const STAFF_AUTH_KEY = 'staffAuth';

        let currentAgent = null;
        let editingAgent = null;
        let chatHistory = [];
        const API_BASE = window.location.origin;

        function checkAuth() {
            if (sessionStorage.getItem(STAFF_AUTH_KEY) !== 'true') {
                window.location.href = '/ai/login.html';
            }
        }

        function logout() {
            sessionStorage.removeItem(STAFF_AUTH_KEY);
            window.location.href = '/ai/login.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function switchTab(tab) {
            document.querySelectorAll('.top-nav-link[data-tab]').forEach(link => link.classList.remove('active'));
            document.querySelector(`.top-nav-link[data-tab="${tab}"]`).classList.add('active');
            document.querySelectorAll('.tab-chat, .tab-dashboard').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
        }

        function goHome() {
            document.getElementById('homeView').style.display = 'flex';
            document.getElementById('chatView').classList.remove('active');
            currentAgent = null;
        }

        function renderAgentCards() {
            const grid = document.getElementById('agentCardGrid');
            grid.innerHTML = AGENTS.map(agent => `
                <div class="agent-card" onclick="openChat('${agent.id}')">
                    <button class="agent-card-edit" onclick="event.stopPropagation(); openEditModal('${agent.id}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <div class="agent-card-header">
                        <div class="agent-card-avatar">
                            <img src="${agent.avatar}" alt="${agent.name}" onerror="this.style.display='none'">
                        </div>
                        <div class="agent-card-info">
                            <div class="agent-card-name">${agent.name}</div>
                            <div class="agent-card-title">${agent.title}</div>
                            <div class="agent-card-nickname">昵称：${agent.nickname}</div>
                        </div>
                    </div>
                    <div class="agent-card-desc">${agent.desc}</div>
                </div>
            `).join('');
        }

        function openChat(agentId) {
            currentAgent = AGENTS.find(a => a.id === agentId);
            chatHistory = [];

            document.getElementById('homeView').style.display = 'none';
            document.getElementById('chatView').classList.add('active');

            document.getElementById('chatAvatar').innerHTML = `<img src="${currentAgent.avatar}" alt="${currentAgent.name}" onerror="this.style.display='none'">`;
            document.getElementById('chatTitle').textContent = currentAgent.name;
            document.getElementById('chatSubtitle').textContent = currentAgent.title;

            document.getElementById('chatMessages').innerHTML = `
                <div class="message avatar-left">
                    <div class="message-avatar"><img src="${currentAgent.avatar}" onerror="this.style.display='none'"></div>
                    <div class="message-bubble">
                        <p>您好！我是${currentAgent.nickname}（${currentAgent.title}）</p>
                        <p>${currentAgent.desc}，请问有什么可以帮您？</p>
                    </div>
                </div>
            `;

            document.getElementById('chatInput').focus();
        }

        function openEditModal(agentId) {
            editingAgent = AGENTS.find(a => a.id === agentId);
            document.getElementById('editName').value = editingAgent.name;
            document.getElementById('editTitle').value = editingAgent.title;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingAgent = null;
        }

        function saveAgentEdit() {
            if (!editingAgent) return;
            const newName = document.getElementById('editName').value.trim();
            const newTitle = document.getElementById('editTitle').value.trim();
            if (newName) editingAgent.name = newName;
            if (newTitle) editingAgent.title = newTitle;
            closeEditModal();
            renderAgentCards();
        }

        async function sendMessage() {
            if (!currentAgent) {
                alert('请先选择 AI 员工');
                return;
            }

            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            const messages = document.getElementById('chatMessages');

            // 用户消息
            messages.insertAdjacentHTML('beforeend', `
                <div class="message user">
                    <div class="message-avatar"></div>
                    <div class="message-bubble"><p>${escapeHtml(message)}</p></div>
                </div>
            `);
            chatHistory.push({ role: 'user', content: message });
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // AI 加载中
            const loadingHtml = `
                <div class="message avatar-left" id="loadingMsg">
                    <div class="message-avatar"><img src="${currentAgent.avatar}" onerror="this.style.display='none'"></div>
                    <div class="message-bubble loading-msg">AI 思考中...</div>
                </div>
            `;
            messages.insertAdjacentHTML('beforeend', loadingHtml);
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch(API_BASE + '/api/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        agent_id: currentAgent.id,
                        message: message,
                        history: chatHistory.slice(-10)
                    })
                });

                if (!response.ok) throw new Error('请求失败');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                const loadingEl = document.getElementById('loadingMsg');
                if (loadingEl) loadingEl.remove();

                messages.insertAdjacentHTML('beforeend', `
                    <div class="message avatar-left">
                        <div class="message-avatar"><img src="${currentAgent.avatar}" onerror="this.style.display='none'"></div>
                        <div class="message-bubble" id="aiResponse"></div>
                    </div>
                `);

                const lastBubble = messages.lastElementChild.querySelector('.message-bubble');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    fullContent += chunk;
                    lastBubble.innerHTML = marked.parse(fullContent);
                    messages.scrollTop = messages.scrollHeight;
                }

                chatHistory.push({ role: 'assistant', content: fullContent });

            } catch (error) {
                const loadingEl = document.getElementById('loadingMsg');
                if (loadingEl) loadingEl.remove();
                messages.insertAdjacentHTML('beforeend', `
                    <div class="message avatar-left">
                        <div class="message-avatar">⚠️</div>
                        <div class="message-bubble"><p style="color: #ff6b6b;">请求失败：${escapeHtml(error.message)}</p></div>
                    </div>
                `);
            }

            sendBtn.disabled = false;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        checkAuth();
        renderAgentCards();
    </script>
</body>
</html>
