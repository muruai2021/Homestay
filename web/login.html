<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猩伙伴 - 员工登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a2e;
            --primary-dark: #0f0f1a;
            --secondary: #16213e;
            --accent: #c4a35a;
            --accent-light: #d4b96a;
            --text-light: #eae7dc;
            --text-muted: #a0a0a0;
            --bg-dark: #0f0f1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .login-card {
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid rgba(196, 163, 90, 0.3);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo svg {
            width: 60px;
            height: 60px;
        }

        .login-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.8rem;
            color: var(--accent);
            text-align: center;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 15, 26, 0.8);
            border: 1px solid rgba(196, 163, 90, 0.3);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(196, 163, 90, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            border: none;
            border-radius: 8px;
            color: var(--primary-dark);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(196, 163, 90, 0.4);
        }

        .login-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .back-link a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 56 56" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="10" y1="6" x2="46" y2="48">
                            <stop stop-color="#c4a35a"/>
                            <stop offset="1" stop-color="#d4b96a"/>
                        </linearGradient>
                    </defs>
                    <path d="M28 6L10 20V48H22V34H34V48H46V20L28 6Z" stroke="url(#logoGrad)" stroke-width="1.5" fill="none"/>
                    <path d="M34 48V40H42V48" stroke="url(#logoGrad)" stroke-width="1.5" fill="none"/>
                    <path d="M14 48V40H22V48" stroke="url(#logoGrad)" stroke-width="1.5" fill="none"/>
                </svg>
            </div>
            <h1 class="login-title">猩伙伴</h1>
            <p class="login-subtitle">员工后台登录</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">员工密码</label>
                    <input type="password" class="form-input" id="password" placeholder="请输入员工密码" required>
                </div>
                <button type="submit" class="login-btn">登 录</button>
                <p class="login-error" id="loginError">密码错误，请重试</p>
            </form>

            <div class="back-link">
                <a href="/">← 返回官网</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const result = await response.json();

                if (result.success) {
                    // 登录成功，保存 session
                    sessionStorage.setItem('staffAuth', 'true');
                    // 跳转到 AI 员工页面
                    window.location.href = '/ai/';
                } else {
                    document.getElementById('loginError').classList.add('show');
                }
            } catch (err) {
                console.error('登录请求失败:', err);
                document.getElementById('loginError').classList.add('show');
            }
        });

        // 已登录则直接跳转
        if (sessionStorage.getItem('staffAuth') === 'true') {
            window.location.href = '/ai/';
        }
    </script>
</body>
</html>
